github:
  owner: ''
  repo: daily-paper-reader
arxiv_paper_setting:
  mode: standard
  days_window: 9
  docs_dir: docs
  prefer_supabase_read: true
supabase:
  enabled: true
  url: https://xnxqplrynpdrozvxvyzg.supabase.co
  anon_key: sb_publishable_lX-oi64Uxyd7SIVv3_w2Uw_MTOojeKq
  papers_table: arxiv_papers
  use_vector_rpc: true
  vector_rpc: match_arxiv_papers
  vector_rpc_ann: match_arxiv_papers
  vector_rpc_exact: match_arxiv_papers_exact
  use_bm25_rpc: true
  bm25_rpc: match_arxiv_papers_bm25
  sync_table: arxiv_sync_status
  sync_success_value: success
  schema: public

# ── Economics RSS / SerpAPI 后端（在 Supabase 中创建 economics_papers 表后启用）─
economics_rss_backend:
  enabled: false                          # 在 Supabase 建好表后改为 true
  url: ''                                 # 与 supabase.url 相同，或单独填写
  anon_key: ''                            # publishable/anon key
  papers_table: economics_papers
  use_vector_rpc: true
  vector_rpc: match_economics_papers
  vector_rpc_ann: match_economics_papers
  vector_rpc_exact: match_economics_papers_exact
  use_bm25_rpc: true
  bm25_rpc: match_economics_papers_bm25
  schema: public

subscriptions:
  schema_migration:
    stage: A
    diff_threshold_pct: 15
  keyword_recall_mode: or
  intent_profiles:

    # ── 1. 货币政策 & 货币周期 ─────────────────────────────────────────────
    - tag: MP
      description: 货币政策与货币周期
      enabled: true
      paper_sources:
        - economics_rss
        - arxiv
      keywords:
        - keyword: monetary policy
          keyword_cn: 货币政策
          query: central bank monetary policy transmission mechanism
        - keyword: monetary policy shocks
          keyword_cn: 货币政策冲击
          query: identification of monetary policy shocks VAR
        - keyword: interest rate policy
          keyword_cn: 利率政策
          query: interest rate policy macroeconomic effects
        - keyword: monetary cycle
          keyword_cn: 货币周期
          query: monetary cycle credit cycle financial conditions index
        - keyword: quantitative easing
          keyword_cn: 量化宽松
          query: quantitative easing unconventional monetary policy effects
        - keyword: inflation targeting
          keyword_cn: 通货膨胀目标制
          query: inflation targeting central bank communication
      intent_queries:
        - query: monetary policy transmission mechanism heterogeneous agents
          query_cn: 货币政策传导机制异质性主体
          enabled: true
          source: manual
        - query: central bank interest rate decisions macroeconomic outcomes
          query_cn: 央行利率决策与宏观经济结果
          enabled: true
          source: manual
        - query: monetary policy effectiveness zero lower bound
          query_cn: 零利率下限货币政策有效性
          enabled: true
          source: manual
        - query: monetary policy uncertainty financial markets
          query_cn: 货币政策不确定性与金融市场
          enabled: true
          source: manual

    # ── 2. 经济尾部风险 & 尾部风险 ───────────────────────────────────────────
    - tag: TR
      description: 经济尾部风险
      enabled: true
      paper_sources:
        - economics_rss
        - arxiv
      keywords:
        - keyword: tail risk
          keyword_cn: 尾部风险
          query: macroeconomic tail risk downside risk distribution
        - keyword: growth at risk
          keyword_cn: 增长风险
          query: growth-at-risk quantile regression GDP distribution
        - keyword: systemic risk
          keyword_cn: 系统性风险
          query: systemic risk financial crises early warning indicators
        - keyword: extreme events economics
          keyword_cn: 极端事件经济学
          query: rare disasters extreme events macroeconomic impact
        - keyword: downside risk
          keyword_cn: 下行风险
          query: downside risk asymmetry business cycle recession probability
        - keyword: disaster risk
          keyword_cn: 灾难风险
          query: disaster risk premium rare events asset pricing
      intent_queries:
        - query: macroeconomic tail risks measurement quantile approach
          query_cn: 宏观经济尾部风险度量分位数方法
          enabled: true
          source: manual
        - query: financial vulnerability systemic risk macro-financial linkages
          query_cn: 金融脆弱性系统性风险宏观金融联动
          enabled: true
          source: manual
        - query: GDP at risk conditional distribution forecasting
          query_cn: 增长风险条件分布预测
          enabled: true
          source: manual
        - query: tail risk hedging insurance macroeconomic policy
          query_cn: 尾部风险对冲保险宏观政策
          enabled: true
          source: manual

    # ── 3. 生产网络 ────────────────────────────────────────────────────────
    - tag: PN
      description: 生产网络
      enabled: true
      paper_sources:
        - economics_rss
        - arxiv
      keywords:
        - keyword: production networks
          keyword_cn: 生产网络
          query: production networks input-output linkages aggregate fluctuations
        - keyword: supply chain
          keyword_cn: 供应链
          query: global supply chain disruption economic impact
        - keyword: input-output analysis
          keyword_cn: 投入产出分析
          query: input-output network propagation economic shocks
        - keyword: sectoral linkages
          keyword_cn: 部门间联系
          query: inter-sectoral linkages propagation mechanism macroeconomics
        - keyword: network economics
          keyword_cn: 网络经济学
          query: network structure economic resilience amplification
        - keyword: global value chains
          keyword_cn: 全球价值链
          query: global value chains trade fragmentation economic complexity
      intent_queries:
        - query: production network propagation of shocks aggregate volatility
          query_cn: 生产网络冲击传播与总体波动
          enabled: true
          source: manual
        - query: supply chain disruption macroeconomic consequences resilience
          query_cn: 供应链中断宏观经济后果与韧性
          enabled: true
          source: manual
        - query: input-output linkages sectoral comovement business cycles
          query_cn: 投入产出联系部门协动与经济周期
          enabled: true
          source: manual

    # ── 4. 政策效应 & 政策评估 ────────────────────────────────────────────
    - tag: PE
      description: 政策效应与政策评估
      enabled: true
      paper_sources:
        - economics_rss
        - arxiv
      keywords:
        - keyword: policy evaluation
          keyword_cn: 政策评估
          query: causal inference policy evaluation natural experiment
        - keyword: fiscal policy multiplier
          keyword_cn: 财政政策乘数
          query: fiscal policy multiplier government spending stimulus
        - keyword: policy uncertainty
          keyword_cn: 政策不确定性
          query: economic policy uncertainty investment consumption
        - keyword: regulatory policy
          keyword_cn: 监管政策
          query: regulatory policy effects economic outcomes
        - keyword: structural reforms
          keyword_cn: 结构性改革
          query: structural reforms labor market product market effects
      intent_queries:
        - query: macroeconomic policy effects identification causal inference
          query_cn: 宏观经济政策效应识别因果推断
          enabled: true
          source: manual
        - query: fiscal multipliers state dependence recession
          query_cn: 财政乘数状态依赖性与衰退
          enabled: true
          source: manual
        - query: policy uncertainty investment irreversibility real options
          query_cn: 政策不确定性投资不可逆性实物期权
          enabled: true
          source: manual

    # ── 5. 经济周期 & 商业周期 ────────────────────────────────────────────
    - tag: BC
      description: 经济周期与商业周期
      enabled: true
      paper_sources:
        - economics_rss
        - arxiv
      keywords:
        - keyword: business cycle
          keyword_cn: 经济周期
          query: business cycle fluctuations recession expansion dynamics
        - keyword: economic fluctuations
          keyword_cn: 经济波动
          query: aggregate economic fluctuations driving forces
        - keyword: DSGE model
          keyword_cn: DSGE模型
          query: dynamic stochastic general equilibrium DSGE business cycle
        - keyword: credit cycle
          keyword_cn: 信贷周期
          query: credit cycle financial accelerator boom bust
        - keyword: real business cycle
          keyword_cn: 真实经济周期
          query: real business cycle technology shocks productivity
      intent_queries:
        - query: business cycle asymmetry recession amplification nonlinear
          query_cn: 经济周期非对称性衰退放大机制非线性
          enabled: true
          source: manual
        - query: financial frictions credit constraints business cycle propagation
          query_cn: 金融摩擦信贷约束经济周期传导
          enabled: true
          source: manual
        - query: heterogeneous agent business cycle model inequality
          query_cn: 异质性主体经济周期模型不平等
          enabled: true
          source: manual

    # ── 6. 经济韧性 ────────────────────────────────────────────────────────
    - tag: ER
      description: 经济韧性
      enabled: true
      paper_sources:
        - economics_rss
        - arxiv
      keywords:
        - keyword: economic resilience
          keyword_cn: 经济韧性
          query: economic resilience recovery shock absorption capacity
        - keyword: macroeconomic resilience
          keyword_cn: 宏观经济韧性
          query: macroeconomic resilience aggregate shocks recovery dynamics
        - keyword: regional resilience
          keyword_cn: 区域韧性
          query: regional economic resilience local labor markets
        - keyword: financial resilience
          keyword_cn: 金融韧性
          query: financial system resilience stress testing bank stability
      intent_queries:
        - query: economic resilience measurement recovery after shocks
          query_cn: 经济韧性度量冲击后恢复能力
          enabled: true
          source: manual
        - query: supply chain resilience diversification policy recommendations
          query_cn: 供应链韧性多元化政策建议
          enabled: true
          source: manual

    # ── 7. VAR 计量方法 ────────────────────────────────────────────────────
    - tag: VAR
      description: VAR向量自回归方法
      enabled: true
      paper_sources:
        - economics_rss
        - arxiv
      keywords:
        - keyword: VAR model
          keyword_cn: 向量自回归模型
          query: vector autoregression VAR identification macroeconomics
        - keyword: structural VAR
          keyword_cn: 结构VAR
          query: structural vector autoregression SVAR shock identification
        - keyword: local projections
          keyword_cn: 局部投影
          query: local projections impulse response function estimation
        - keyword: Bayesian VAR
          keyword_cn: 贝叶斯VAR
          query: Bayesian VAR forecasting macroeconomic time series
        - keyword: factor model
          keyword_cn: 因子模型
          query: dynamic factor model large dataset macroeconomic forecasting
        - keyword: panel VAR
          keyword_cn: 面板VAR
          query: panel VAR cross-country heterogeneity dynamic effects
      intent_queries:
        - query: SVAR identification sign restrictions external instruments
          query_cn: SVAR识别符号约束外部工具变量
          enabled: true
          source: manual
        - query: local projections vs VAR impulse response comparison
          query_cn: 局部投影与VAR脉冲响应函数比较
          enabled: true
          source: manual
        - query: high-dimensional VAR large Bayesian shrinkage forecasting
          query_cn: 高维VAR大规模贝叶斯收缩预测
          enabled: true
          source: manual
